name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binaries
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o dist/kcp-dashboard-linux-amd64      .
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o dist/kcp-dashboard-linux-arm64      .
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o dist/kcp-dashboard-darwin-amd64     .
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o dist/kcp-dashboard-darwin-arm64     .
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/kcp-dashboard-windows-amd64.exe .

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: "kcp-dashboard ${{ github.ref_name }}"
          body: |
            ## Installation

            ```bash
            curl -fsSL https://raw.githubusercontent.com/Cantara/kcp-dashboard/main/bin/install.sh | bash
            ```

            Auto-detects OS and architecture. Installs to `~/.local/bin/kcp-dashboard`.

            ## Usage

            ```bash
            kcp-dashboard          # live TUI — stats, session history, manifest quality
            kcp-dashboard serve    # hook daemon — drop-in replacement for kcp-commands Java daemon
            ```

            `kcp-dashboard serve` listens on port 7734 (same as kcp-commands), reads manifests
            from `~/.kcp/commands/`, and requires no JVM.

            Requires `~/.kcp/usage.db` — populated by kcp-commands v0.20.0+ or `kcp-dashboard serve`.
          files: |
            dist/kcp-dashboard-linux-amd64
            dist/kcp-dashboard-linux-arm64
            dist/kcp-dashboard-darwin-amd64
            dist/kcp-dashboard-darwin-arm64
            dist/kcp-dashboard-windows-amd64.exe
