version: "0.14"

entity:
  name: kcp-dashboard
  type: terminal-ui
  description: >
    Live terminal dashboard for KCP usage statistics. Built with Bubble Tea +
    Lip Gloss. Auto-refreshes every 2 seconds. Shows token savings, guidance
    quality, session profiles, and per-command bar charts — all the KCP toolchain
    observability you need in one TUI.

authority:
  owner: Cantara — Norwegian Software Development Foundation
  repo: https://github.com/Cantara/kcp-dashboard
  license: Apache-2.0

discovery:
  provenance: canonical
  confidence: high
  staleness_days: 30

signing:
  scheme: ed25519
  scope: this-manifest
  public_key: https://wiki.cantara.no/.well-known/kcp-signing-key.pub
  signature: https://raw.githubusercontent.com/Cantara/kcp-dashboard/main/knowledge.yaml.sig

kcp_version: "0.14"
project: kcp-dashboard
language: en
license: "Apache-2.0"
runtime: Go
indexing: open

units:

  - id: readme
    path: README.md
    intent: "What is kcp-dashboard, what panels does it show, and how do I install and run it?"
    scope: global
    audience: [human, agent, developer]
    validated: "2026-05-07"
    triggers: [kcp-dashboard, dashboard, tui, terminal, panels, overview, guidance effects, session profile, commands guided, install, bubble tea, lip gloss, auto-refresh]

  - id: main
    path: main.go
    intent: "Where is the kcp-dashboard entry point and how does the application start?"
    scope: module
    audience: [developer]
    validated: "2026-05-07"
    depends_on: [readme]
    triggers: [main, entry point, start, launch]

  - id: view
    path: view.go
    intent: "How are the dashboard panels rendered? Where is the TUI view logic?"
    scope: module
    audience: [developer]
    validated: "2026-05-07"
    depends_on: [readme]
    triggers: [view, render, panels, tui, bubble tea, layout, lip gloss]

  - id: db
    path: db.go
    intent: "How does kcp-dashboard read KCP metrics from the local SQLite database?"
    scope: module
    audience: [developer]
    validated: "2026-05-07"
    depends_on: [readme]
    triggers: [db, database, sqlite, metrics, read, query, storage]

relationships:
  - from: readme
    to: main
    type: enables
  - from: main
    to: view
    type: enables
  - from: main
    to: db
    type: enables
